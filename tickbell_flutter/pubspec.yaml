name: tickbell
description: TickBell — When every second matters. Native Flutter client for the TickBell Supabase backend.
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # State management / navigation
  flutter_riverpod: ^2.5.1
  go_router: ^14.2.7

  # Backend
  supabase_flutter: ^2.5.11

  # Push notifications
  firebase_core: ^3.6.0
  firebase_messaging: ^15.1.3
  flutter_local_notifications: ^17.2.3

  # UX
  google_fonts: ^6.2.1
  vibration: ^2.0.1
  intl: ^0.19.0
  url_launcher: ^6.3.0
  shared_preferences: ^2.3.2

  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
